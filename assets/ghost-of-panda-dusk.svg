    <rect x="228" y="72" width="40" height="22" rx="4" fill="#67B7F9"/>
    <rect x="273" y="72" width="40" height="22" rx="4" fill="#F68ED0"/>
    <rect x="318" y="72" width="40" height="22" rx="4" fill="#17C7D3"/>
    <rect x="363" y="72" width="40" height="22" rx="4" fill="#E6E6E6"/>
    <rect x="408" y="72" width="40" height="22" rx="4" fill="#ACB0B9"/>
    <rect x="453" y="72" width="40" height="22" rx="4" fill="#FF8FA9"/>
    <rect x="498" y="72" width="40" height="22" rx="4" fill="#05C7AA"/>
    <rect x="543" y="72" width="40" height="22" rx="4" fill="#FF970F"/>
    <rect x="588" y="72" width="40" height="22" rx="4" fill="#67B7F9"/>
    <rect x="633" y="72" width="40" height="22" rx="4" fill="#F68ED0"/>
    <rect x="678" y="72" width="40" height="22" rx="4" fill="#17C7D3"/>
    <rect x="723" y="72" width="40" height="22" rx="4" fill="#FFFFFF"/>
