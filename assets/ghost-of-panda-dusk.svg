  <circle cx="92" cy="37" r="6.5" fill="#05C7AA"/>
  <text x="410" y="42" text-anchor="middle" fill="#ACB0B9" font-size="13" letter-spacing="0.4">Ghost of Panda Dusk</text>

  <!-- palette swatch band (ANSI 0-15) -->
