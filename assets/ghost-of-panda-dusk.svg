  <!-- terminal session -->
  <text x="48" y="134" fill="#E6E6E6"><tspan fill="#05C7AA">&#10095; </tspan>ls</text>
  <text x="48" y="162" fill="#E6E6E6"><tspan fill="#67B7F9">assets/</tspan>  <tspan fill="#67B7F9">themes/</tspan>  <tspan fill="#05C7AA">preview.sh</tspan>  README.md  LICENSE</text>
  <text x="48" y="190" fill="#E6E6E6"><tspan fill="#05C7AA">&#10095; </tspan>git status -s</text>
  <text x="48" y="218" fill="#E6E6E6"><tspan fill="#FF970F"> M </tspan>themes/ghost-of-panda</text>
  <text x="48" y="246" fill="#E6E6E6"><tspan fill="#FF8FA9">?? </tspan>assets/ghost-of-panda.svg</text>
  <text x="48" y="274" fill="#ACB0B9"># comments and dim text stay readable</text>

  <!-- selection highlight -->
  <rect x="44" y="288" width="204" height="24" rx="3" fill="#9097A7"/>
  <text x="48" y="305" fill="#2B2D2E">this text is selected</text>

  <!-- accent legend -->
