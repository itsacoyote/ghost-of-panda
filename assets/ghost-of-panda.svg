    <rect x="48"  y="72" width="40" height="22" rx="4" fill="#292A2B" stroke="#4a4c4e"/>
    <rect x="93"  y="72" width="40" height="22" rx="4" fill="#FF4B82"/>
    <rect x="138" y="72" width="40" height="22" rx="4" fill="#19F9D8"/>
    <rect x="183" y="72" width="40" height="22" rx="4" fill="#FFB86C"/>
    <rect x="228" y="72" width="40" height="22" rx="4" fill="#45A9F9"/>
    <rect x="273" y="72" width="40" height="22" rx="4" fill="#FF75B5"/>
    <rect x="318" y="72" width="40" height="22" rx="4" fill="#2CE0EA"/>
    <rect x="363" y="72" width="40" height="22" rx="4" fill="#E6E6E6"/>
    <rect x="408" y="72" width="40" height="22" rx="4" fill="#8E93A4"/>
    <rect x="453" y="72" width="40" height="22" rx="4" fill="#FF4B82"/>
    <rect x="498" y="72" width="40" height="22" rx="4" fill="#19F9D8"/>
    <rect x="543" y="72" width="40" height="22" rx="4" fill="#FFCC95"/>
    <rect x="588" y="72" width="40" height="22" rx="4" fill="#6FC1FF"/>
    <rect x="633" y="72" width="40" height="22" rx="4" fill="#FF9AC1"/>
    <rect x="678" y="72" width="40" height="22" rx="4" fill="#2CE0EA"/>
