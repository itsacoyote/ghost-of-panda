  <!-- terminal session -->
  <text x="48" y="134" fill="#E6E6E6"><tspan fill="#19F9D8">&#10095; </tspan>ls</text>

  <text x="48" y="162" fill="#E6E6E6"><tspan fill="#45A9F9">assets/</tspan>  <tspan fill="#45A9F9">themes/</tspan>  <tspan fill="#19F9D8">preview.sh</tspan>  README.md  LICENSE</text>

  <text x="48" y="190" fill="#E6E6E6"><tspan fill="#19F9D8">&#10095; </tspan>git status -s</text>
  <text x="48" y="218" fill="#E6E6E6"><tspan fill="#FFB86C"> M </tspan>themes/ghost-of-panda</text>
  <text x="48" y="246" fill="#E6E6E6"><tspan fill="#FF4B82">?? </tspan>assets/ghost-of-panda.svg</text>

  <text x="48" y="274" fill="#8E93A4"># comments and dim text stay readable</text>

  <!-- selection highlight -->
  <rect x="44" y="288" width="204" height="24" rx="3" fill="#8E93A4"/>
  <text x="48" y="305" fill="#292A2B">this text is selected</text>

  <!-- accent legend -->
  <text x="48" y="334" fill="#E6E6E6"><tspan fill="#FF4B82">error</tspan>  <tspan fill="#FFB86C">warn</tspan>  <tspan fill="#19F9D8">ok</tspan>  <tspan fill="#2CE0EA">info</tspan>  <tspan fill="#45A9F9">link</tspan>  <tspan fill="#FF75B5">hint</tspan></text>
